<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Listado de Alumnos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />

    <!-- estilos propios -->
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

    <h1>Listado de Alumnos</h1>

    <div class="container row my-5 text-center">

        <!-- tarjeta alumnos -->
        <div class="col d-flex justify-content-center">

          <div class="card" style="width: 18rem;">
            <div class="card-body">
              <h2 class="card-title"><b>Alumnos</b></h2>
              <p class="card-text">Listado de Alumnos.<br>Agregar alumno.<br>Modificar alumno.<br>Eliminar alumno.</p>
              <a th:href="@{/alumnos}" class="btn btn-primary">Ir a Alumnos</a>
            </div>
          </div>

        </div>


        <!-- tarjeta carreras -->
        <div class="col d-flex justify-content-center">

          <div class="card" style="width: 18rem;">
            <div class="card-body">
              <h2 class="card-title"><b>Carreras</b></h2>
              <p class="card-text">Listado de Carreras.<br>Cantidad de alumnos por carrera.</p>
              <a th:href="@{/carreras}" class="btn btn-primary">Ir a Carreras</a>
            </div>
          </div>

        </div>

    </div>

    <footer>
        <span>Laboratorio de Programación 2026</span>
    </footer>

</body>

</html>
