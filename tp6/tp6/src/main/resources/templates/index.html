<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Listado de Alumnos</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />

</head>

<body>

  <div class="container">
    <div class="row">
      <h1>Listado de Alumnos</h1>
    </div>

    <!-- Agregar alumno -->
    <div class="row">
      <div class="col-lg-3">
        <a th:href="@{/alumnos/nuevo}" class="btn btn-primary btn-sm mb3">Agregar alumno</a>
      </div>
    </div>
    <br>

    <!-- Listado de alumnos en la base de datos -->
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Apellido y Nombre</th>
          <th>DNI</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="alumno : ${alumnos}">
          <td th:text="${alumno.apellidoNombre}">Apellido y Nombre</td>
          <td th:text="${alumno.dni}">DNI</td>
          <td th:text="${alumno.email}">Email</td>
          <td th:text="${alumno.telefono}">Teléfono</td>
          <td>
            <a th:href="@{/alumnos/editar/{id}(id=${alumno.id})}" class="btn btn-info">Modificar</a>
            <a th:href="@{/alumnos/{id}(id=${alumno.id})}" class="btn btn-danger">Eliminar</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</body>

</html>
