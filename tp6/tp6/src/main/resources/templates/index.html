<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Listado de Alumnos</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />

  <!-- estilos propios -->
  <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

  <h1>Listado de Alumnos</h1>

  <div class="container my-5">

    <!-- Agregar alumno -->
    <div class="row">
      <div class="col-lg-3">
        <a th:href="@{/alumnos/nuevo}" class="btn btn-info btn-sm mb3" role="button">Agregar alumno</a>
      </div>
    </div>
    <br>

    <!-- Listado de alumnos en la base de datos -->
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Apellido y Nombre</th>
          <th>DNI</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Carrera</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody class="table-group-divider">
        <tr th:each="alumno : ${alumnos}">
          <td th:text="${alumno.apellidoNombre}">Apellido y Nombre</td>
          <td th:text="${alumno.dni}">DNI</td>
          <td th:text="${alumno.email}">Email</td>
          <td th:text="${alumno.telefono}">Teléfono</td>
          <td th:text="${alumno.carrera.nombre}">Carrera</td>
          <td>
            <a th:href="@{/alumnos/editar/{id}(id=${alumno.id})}" class="btn btn-info" role="button">Modificar</a>
            <a th:href="@{/alumnos/{id}(id=${alumno.id})}" class="btn btn-danger" role="button" onclick="return confirm('¿Estás seguro de que quieres eliminar este alumno?')">Eliminar</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <footer>
    <span>Laboratorio de Programación 2026</span>
  </footer>

</body>

</html>
