<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Listado de Carreras</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />

  <!-- estilos propios -->
  <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

  <h1>Listado de Carreras</h1>

  <div class="row text-center">
      <div class="col-lg-3">
        <a th:href="@{/}" class="btn btn-info btn-sm mb3" role="button">Volver al inicio</a>
      </div>
</div>

  <div class="container my-5">

    <!-- Listado de carreras en la base de datos -->
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Cant. Alumnos</th>
        </tr>
      </thead>
      <tbody class="table-group-divider">
        <tr th:each="carrera : ${carreras}">
          <td th:text="${carrera.nombre}">Nombre</td>
          <td th:text="${carrera.alumnos.size()}">Cant. Alumnos</td>
        </tr>
      </tbody>
    </table>
  </div>

  <footer>
    <span>Laboratorio de Programación 2026</span>
  </footer>

</body>

</html>
