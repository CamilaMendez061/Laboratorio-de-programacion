<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />

  <title>Formulario de Registro de Alumnos</title>

</head>

<body class="container-fluid d-flex flex-column min-vh-100">

  <header>

    <div class="row bg-info">
      <h1 class="display-1 pt-5 text-center">La Universidad</h1>
      <h2 class="display-5 pb-5 text-center">Gestión de Alumnos</h2>
    </div>

    <!-- barra de navegación / menú -->
    <div class="row">
      <nav class="navbar bg-dark navbar-dark">
        <div class="col">
          <div class="container-fluid ps-4">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>

            <a class="navbar-brand ps-1 text-info" href="#">Menú</a>

            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav me-auto pt-2">
                <li class="nav-item"><a class="nav-link text-info" aria-current="page"
                    href="gestion-alumnos_index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active fw-semibold" href="#">Registrar Alumno</a></li>
                <li class="nav-item"><a class="nav-link text-info" href="listado-carreras.html">Listado de Carreras</a>
                </li>
              </ul>
            </div>

          </div>
      </nav>

    </div>
    </div>

  </header>

  <main class="container my-5">

    <div class="row justify-content-center">

      <form>
        <div class="text-center">
          <h1>Formulario de registro de Alumnos</h1>
        </div>

        <!-- ID -->
        <div class="mb-3">
          <label for="input_id" class="form-label">ID</label>
          <input type="text" id="input_id" class="form-control" placeholder="Ingresar el ID del Alumno">
        </div>

        <!-- Nombre y apellido del alumno -->
        <div class="mb-3">
          <label for="input_nombreApellido" class="form-label">Nombre y Apellido</label>
          <input type="text" id="input_nombreApellido" class="form-control"
            placeholder="Escribir el nombre completo del alumno">
        </div>

        <!-- DNI -->
        <div class="mb-3">
          <label for="input_dni" class="form-label">DNI</label>
          <input type="text" id="input_dni" class="form-control"
            placeholder="Escribir el número de DNI del alumno, sin puntos">
        </div>

        <!-- email -->
        <div class="mb-3">
          <label for="input_email" class="form-label">Correo Electrónico</label>
          <input type="email" id="input_email" class="form-control" placeholder="ejemplo@dominio.com">
        </div>

        <!-- teléfono-->
        <div class="mb-3">
          <label for="input_telefono" class="form-label">Teléfono</label>
          <input type="text" id="input_telefono" class="form-control" placeholder="2966223344">
        </div>

        <!-- carrera -->
        <div class="mb-3">
          <label for="select_carrera" class="form-label">Carrera</label>
          <select id="select_carrera" class="form-select">
            <option selected>Seleccionar una carrera</option>
            <option value="0001">Analista de Sistemas</option>
            <option value="0002">Licenciatura en Sistemas</option>
            <option value="0003">Ingeniería en Recursos Naturales Renovables</option>
            <option value="0004">Tecnicatura en Análisis Químico</option>
            <option value="0005">Ingeniería Química</option>
            <option value="0006">Profesorado en Matemática</option>
            <option value="0007">Licenciatura en Administración</option>
            <option value="0008">Tecnicatura Universitaria en Gestión de Organizaciones</option>
            <option value="0009">Profesorado en Economía y Gestión de Organizaciones</option>
            <option value="0010">Licenciatura en Trabajo Social</option>
            <option value="0011">Licenciatura en Comunicación Social</option>
            <option value="0012">Tecnicatura y Licenciatura en Turismo</option>
            <option value="0013">Profesorado en Letras</option>
            <option value="0014">Profesorado en Historia</option>
            <option value="0015">Profesorado en Geografía</option>
            <option value="0016">Licenciatura en Psicopedagogía</option>
            <option value="0017">Licenciatura en Enfermería</option>
            <option value="0018">Tecnicatura Universitaria en Acompañamiento Terapéutico</option>
          </select>
        </div>

        <div class="d-flex justify-content-center">
          <button type="submit" class="btn btn-primary">Registrar Alumno</button>
        </div>

      </form>

    </div>

  </main>

  <footer class="row bg-dark text-info text-center py-3">
    <div class="container">
      <span>Sistema de Gestión de Alumnos de La Universidad. © 2026</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
    crossorigin="anonymous"></script>
</body>

</html>
