<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />

  <title>Gestión de Alumnos</title>

</head>

<body class="container-fluid d-flex flex-column min-vh-100">

  <header>

    <div class="row bg-info">
      <h1 class="display-1 pt-5 text-center">La Universidad</h1>
      <h2 class="display-5 pb-5 text-center">Gestión de Alumnos</h2>
    </div>

    <!-- barra de navegación / menú -->
    <div class="row">
      <nav class="navbar bg-dark navbar-dark">
        <div class="col">
          <div class="container-fluid ps-4">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>

            <a class="navbar-brand ps-1 text-info" href="#">Menú</a>

            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav me-auto pt-2">
                <li class="nav-item"><a class="nav-link active fw-semibold" aria-current="page" href="#">Inicio</a></li>
                <li class="nav-item"><a class="nav-link text-info" href="registrar-alumno.html">Registrar Alumno</a>
                </li>
                <li class="nav-item"><a class="nav-link text-info" href="listado-carreras.html">Listado de Carreras</a>
                </li>
              </ul>
            </div>

          </div>
      </nav>

    </div>
    </div>

  </header>

  <main class="container-fluid">

    <!-- Tarjetas -->
    <div class="row justify-content-center">
      <div class="col-12 col-md-4">
        <div class="card my-5 ms-2">
          <div class="card-body">
            <h5 class="card-title small">Frase del día</h5>
            <figure>
              <blockquote class="blockquote">
                <p>"La educación es el arma más poderosa que puedes usar para cambiar el mundo."</p>
              </blockquote>
              <figcaption class="blockquote-footer">Nelson Mandela</figcaption>
            </figure>
          </div>
        </div>
        <div class="card my-5 ms-2">
          <img src="img/calendario.png" class="card-img-top" alt="Calendario junio 2026">
          <div class="card-body">
            <p class="card-text">El próximo feriado es el <strong>15 de Junio</strong> de 2026</p>
          </div>
        </div>
      </div>

      <!-- Carrusel -->
      <div class="col-12 col-md-8 my-5">
        <div id="carrusel" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-indicators">
            <button type="button" data-bs-target="#carrusel" data-bs-slide-to="0" class="active" aria-current="true"
              aria-label="Slide1"></button>
            <button type="button" data-bs-target="#carrusel" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carrusel" data-bs-slide-to="2" aria-label="Slide 3"></button>
          </div>

          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="img/universidad3.jpg" class="d-block w-100" alt="slide 1">
            </div>
            <div class="carousel-item">
              <img src="img/universidad2.jpg" class="d-block w-100" alt="slide 2">
            </div>
            <div class="carousel-item">
              <img src="img/universidad1.jpg" class="d-block w-100" alt="slide 3">
            </div>
          </div>

          <button class="carousel-control-prev" type="button" data-bs-target="#carrusel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carrusel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Siguiente</span>
          </button>

        </div>

      </div>
    </div>

  </main>

  <footer class="row bg-dark text-info text-center py-3">
    <div class="container">
      <span>Sistema de Gestión de Alumnos de La Universidad. © 2026</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
    crossorigin="anonymous"></script>
</body>

</html>
