<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />

  <title>Formulario</title>

</head>

<body>

  <div class="container">
    <div class="row justify-content-center my-4">

      <form>
        <div class="text-center">
          <h1>Formulario de registro</h1>
        </div>

        <!-- Mensaje de registro -->
        <div class="alert alert-primary my-3 p-1" role="alert">
          <p class="ms-3 mt-2">Ud. está a punto de registrarse</p>
        </div>

        <!-- Nombre completo -->
        <div class="mb-3">
          <label for="input_nombre" class="form-label">Nombre Completo</label>
          <input type="text" id="input_nombre" class="form-control" placeholder="Escribe tu nombre completo">

        </div>

        <!-- Correo electrónico -->
        <div class="mb-3">
          <label for="input_email" class="form-label">Correo Electrónico</label>
          <input type="email" id="input_email" class="form-control" placeholder="ejemplo@dominio.com">

        </div>

        <!-- Contraseña -->
        <div class="mb-3">
          <label for="input_pass" class="form-label">Contraseña</label>
          <input type="password" id="input_pass" class="form-control" placeholder="Crea una contraseña">

        </div>

        <!-- Confirmar contraseña -->
        <div class="mb-3">
          <label for="input_pass2" class="form-label">Confirmar Contraseña</label>
          <input type="password" id="input_pass2" class="form-control" placeholder="Repite tu contraseña">

        </div>

        <!-- Género -->
        <div class="mb-3">
          <label for="input_genero" class="form-label">Género</label>
          <div class="form-check">
            <input type="radio" name="input_genero" id="input_genero1" class="form-check-input">
            <label for="input_genero1" class="form-check-label">Masculino</label>
          </div>
          <div class="form-check">
            <input type="radio" name="input_genero" id="input_genero2" class="form-check-input">
            <label for="input_genero2" class="form-check-label">Femenino</label>
          </div>
          <div class="form-check">
            <input type="radio" name="input_genero" id="input_genero3" class="form-check-input">
            <label for="input_genero3" class="form-check-label">Otro</label>
          </div>
        </div>

        <!-- Términos y condiciones -->
        <div class="mb-3 form-check">
          <input type="checkbox" id="check_terminos" class="form-check-input">
          <label for="check_terminos" class="form-check-label">Acepto los <a href="#" class="link-primary">Términos y
              Condiciones</a></label>
        </div>

        <!-- País -->
        <div class="mb-3">
          <label for="select_pais" class="form-label">País</label>
          <select id="select_pais" class="form-select">
            <option selected>Selecciona tu país</option>
            <option value="ar">Argentina</option>
            <option value="cl">Chile</option>
            <option value="uy">Uruguay</option>
            <option value="py">Paraguay</option>
            <option value="pe">Perú</option>
            <option value="br">Brasil</option>
            <option value="co">Colombia</option>
            <option value="bo">Bolivia</option>
            <option value="cr">Costa Rica</option>
            <option value="sv">El Salvador</option>
            <option value="ve">Venezuela</option>
          </select>
        </div>

        <!-- Botón Registrar -->
        <div class="row">
          <button type="submit" class="btn btn-primary">Registrar</button>
        </div>

      </form>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
    crossorigin="anonymous"></script>

</body>

</html>
